<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Firmen OS Enterprise Foundation Demo"><title>Firmen OS · Foundation</title><style>:root{--bg:#081019;--side:#0c151f;--panel:#111d29;--panel2:#162433;--line:#263748;--text:#f4f7fa;--muted:#93a1b0;--lime:#b8f36c;--amber:#ffc76b;--red:#ff858d}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{display:flex;min-height:100vh}.side{position:fixed;inset:0 auto 0 0;width:238px;background:var(--side);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;z-index:20}.brand{display:flex;gap:11px;align-items:center;padding:2px 8px 24px}.logo{width:39px;height:39px;border-radius:11px;background:var(--lime);color:#0e160b;display:grid;place-items:center;font-weight:900}.brand b,.brand small{display:block}.brand small{font-size:10px;color:var(--muted);margin-top:3px}.nav{display:grid;gap:4px}.nav button{border:0;background:transparent;color:#aab6c2;text-align:left;padding:11px 12px;border-radius:9px}.nav button:hover,.nav button.on{background:#192735;color:#fff;box-shadow:inset 2px 0 var(--lime)}.nav i{font-style:normal;color:var(--lime);display:inline-block;width:26px}.status{margin-top:auto;border-top:1px solid var(--line);padding:16px 9px 2px;font-size:11px}.status small{display:block;color:var(--muted);margin-top:5px}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);margin-right:7px}.main{margin-left:238px;width:calc(100% - 238px)}.top{position:sticky;top:0;z-index:10;min-height:78px;background:rgba(8,16,25,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:14px 26px}.title small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:9px}.title h1{font-size:21px;margin:4px 0 0}.tools{margin-left:auto;display:flex;gap:8px}.search{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:0 10px}.search input{border:0;background:transparent;color:#fff;outline:0;padding:10px;width:190px}.primary,.secondary{border:0;border-radius:8px;padding:10px 13px;font-weight:800}.primary{background:var(--lime);color:#10180d}.secondary{background:#243344;color:#fff}.notice{margin:16px 26px 0;border:1px solid #2c4053;background:#101c28;padding:10px 12px;border-radius:9px;color:#b5c1cd;font-size:12px}.notice b{color:var(--lime)}.work{max-width:1450px;margin:auto;padding:19px 26px 48px}.intro{display:flex;justify-content:space-between;color:#b9c4cf;margin-bottom:17px}.intro small{color:var(--muted)}.hero,.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}.card{background:linear-gradient(145deg,var(--panel),#0e1721);border:1px solid var(--line);border-radius:14px;padding:19px}.focus{padding:27px;background:radial-gradient(circle at 80% 10%,rgba(184,243,108,.13),transparent 42%),linear-gradient(145deg,#172534,#0e1721)}.eyebrow{color:var(--lime);font-size:9px;font-weight:900;letter-spacing:.14em}.focus h2{font-size:30px;line-height:1.12;max-width:680px;margin:16px 0 11px}.muted,.focus p{color:var(--muted);line-height:1.55}.actions{display:flex;gap:8px;margin-top:20px}.head,.panelhead{display:flex;justify-content:space-between;align-items:center}.health{font-size:28px;font-weight:900;color:var(--lime)}.checks{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:28px;font-size:11px;color:#c4ced7}.checks span:before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--lime);margin-right:7px}.checks .warn:before{background:var(--amber)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin:14px 0}.metric span{font-size:10px;color:var(--muted)}.metric strong{display:block;font-size:24px;margin:8px 0}.metric small{font-size:9px;color:var(--lime)}.panelhead{border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:8px}.panelhead h3{margin:0;font-size:14px}.row{display:grid;grid-template-columns:70px 1fr 85px;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid #213143}.row:last-child{border:0}.row strong,.gate strong{font-size:12px;display:block}.row small,.gate small{font-size:10px;color:var(--muted);display:block;margin-top:4px}.pill{width:max-content;padding:5px 8px;border-radius:18px;font-size:8px;font-weight:900;text-transform:uppercase}.critical,.blocked{background:#3b1f28;color:#ff9da4}.high,.risk{background:#3b2e18;color:#ffd07a}.medium{background:#1b3148;color:#91c8ff}.open{background:#263443;color:#c0cad4}.running{background:#263818;color:var(--lime)}.done,.healthy{background:#1b3826;color:#9be7b0}.gate{display:flex;gap:11px;padding:11px 0}.gate>span{width:24px;height:24px;border-radius:50%;border:1px solid #415164;display:grid;place-items:center}.gate .ok{background:var(--lime);border-color:var(--lime);color:#111}.projectgrid,.knowledgegrid,.settingsgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.project{background:var(--panel2);border:1px solid #2b3e52;border-radius:11px;padding:15px}.project h3{font-size:15px;margin:14px 0 5px}.project p{font-size:10px;color:var(--muted)}.progress{height:5px;background:#263849;border-radius:8px;overflow:hidden;margin:17px 0 8px}.progress b{display:block;height:100%;background:var(--lime)}.project footer{display:flex;justify-content:space-between;color:var(--muted);font-size:9px}.tasktable{overflow:auto}.taskrow{min-width:690px;display:grid;grid-template-columns:2fr 1.1fr 90px 115px;gap:10px;align-items:center;padding:12px;border-bottom:1px solid #213143;font-size:11px}.taskrow.header{color:var(--muted);font-size:8px;text-transform:uppercase}.taskrow small{display:block;color:var(--muted);margin-top:4px}.taskrow select{background:#182735;color:#fff;border:1px solid #354b60;border-radius:7px;padding:7px}.crm{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:9px;overflow:auto}.column{background:#0d1721;border:1px solid #223448;border-radius:9px;padding:9px;min-height:290px}.column h4{font-size:10px;margin:3px 2px 11px}.customer{background:#172534;border:1px solid #2b4055;border-radius:8px;padding:11px;margin-bottom:8px}.customer strong,.customer small,.customer em{display:block}.customer strong{font-size:11px}.customer b{display:block;font-size:15px;margin:8px 0}.customer small{font-size:9px;color:var(--muted);line-height:1.45}.customer em{font-size:8px;color:var(--lime);font-style:normal;margin-top:8px}.knowledgegrid{grid-template-columns:repeat(3,1fr)}.knowledge h3{font-size:14px}.knowledge p{font-size:10px;color:var(--muted);line-height:1.5}.knowledge small{color:var(--lime)}.agent{display:grid;grid-template-columns:36px 1fr 70px 90px;gap:9px;align-items:center;padding:12px 0;border-bottom:1px solid #213143}.avatar{width:31px;height:31px;border-radius:9px;background:#21361c;color:var(--lime);display:grid;place-items:center}.agent strong,.agent small{display:block}.agent strong{font-size:11px}.agent small,.agent em{font-size:9px;color:var(--muted);font-style:normal}.good{color:var(--lime)!important}.rules li{padding:9px 0;border-bottom:1px solid #213143;color:#c6d0da;font-size:11px}.mobile{display:none;border:0;background:transparent;color:#fff;font-size:20px}@media(max-width:1000px){.hero,.grid2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.knowledgegrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.side{transform:translateX(-100%);transition:.2s}.side.show{transform:translateX(0);box-shadow:20px 0 70px #000}.main{margin-left:0;width:100%}.mobile{display:block}.top{padding:12px 14px;flex-wrap:wrap}.tools{width:100%;order:3}.search{flex:1}.search input{width:100%}.notice{margin:12px 14px 0}.work{padding:15px}.focus h2{font-size:24px}.metrics,.projectgrid,.knowledgegrid,.settingsgrid{grid-template-columns:1fr}.checks{grid-template-columns:1fr}.intro small{display:none}}</style></head><body><div class="app"><aside class="side" id="side"><div class="brand"><div class="logo">FO</div><div><b>Firmen OS</b><small>Enterprise Foundation</small></div></div><nav class="nav" id="nav"><button class="on" data-page="cockpit"><i>⌂</i>Cockpit</button><button data-page="company"><i>◆</i>Unternehmen</button><button data-page="projects"><i>▦</i>Projekte</button><button data-page="work"><i>✓</i>Arbeit</button><button data-page="crm"><i>◎</i>CRM</button><button data-page="finance"><i>€</i>Finanzen</button><button data-page="knowledge"><i>▤</i>Wissen</button><button data-page="agents"><i>✦</i>Agenten</button></nav><div class="status"><b><span class="dot"></span>Live-Demo</b><small>Foundation 0.1.0</small></div></aside><main class="main"><header class="top"><button class="mobile" id="mobile">☰</button><div class="title"><small id="path">Firmen OS / Cockpit</small><h1 id="title">Cockpit</h1></div><div class="tools"><label class="search">⌕ <input id="search" placeholder="Aufgaben durchsuchen"></label><button class="primary" id="add">+ Aufgabe</button></div></header><div class="notice"><b>●</b> <span id="notice">Live-Demo bereit. Aufgabenänderungen bleiben lokal in diesem Browser gespeichert.</span></div><section class="work" id="content"></section></main></div><script>const seed=[{id:'1',title:'Produkt-Scope einfrieren',owner:'Chris',project:'Firmen OS',due:'Heute',priority:'critical',status:'running'},{id:'2',title:'Supabase Schema und RLS ausführen',owner:'Engineering',project:'Firmen OS',due:'Gate 1',priority:'high',status:'open'},{id:'3',title:'Operator OS Betriebstest protokollieren',owner:'Operations',project:'100K Operator OS',due:'Diese Woche',priority:'high',status:'open'},{id:'4',title:'Angebotsprozess definieren',owner:'Revenue',project:'Sales Automation',due:'Diese Woche',priority:'medium',status:'blocked'},{id:'5',title:'Build und Health verifizieren',owner:'Engineering',project:'Firmen OS',due:'Heute',priority:'high',status:'done'}];let tasks;try{tasks=JSON.parse(localStorage.getItem('firmen-os.tasks'))||seed}catch{tasks=seed}let active='cockpit',q='';const labels={cockpit:'Cockpit',company:'Unternehmen',projects:'Projekte',work:'Arbeit',crm:'CRM',finance:'Finanzen',knowledge:'Wissen',agents:'Agenten'};const desc={cockpit:'Heute sehen, entscheiden und ausführen.',company:'Ziele, Risiken und Verantwortungen.',projects:'Initiativen mit Gates und Beweisen.',work:'Aufgaben, Blocker und Durchsatz.',crm:'Pipeline und nächste Verkaufsaktionen.',finance:'Liquidität, Kosten und Forecast.',knowledge:'Entscheidungen, Standards und Prozesse.',agents:'Kontrollierte KI-Arbeit mit Grenzen.'};const projects=[['Firmen OS Foundation','Produkt & Engineering',42,'healthy','Persistenz + Auth'],['100K Operator OS','Operations',72,'healthy','Betriebsbeweis'],['AI Content Factory','Growth',46,'risk','Qualitätsstandard'],['Sales Automation','Revenue',18,'blocked','CRM-Modell']];const customers=[['Lead','Studio Morgenrot','3.200 €','Bedarf validieren','Chris'],['Qualifiziert','Rheinland Immobilien','7.500 €','Prozess aufnehmen','Sales Agent'],['Angebot','Nordwerk Digital','12.000 €','Entscheider-Call','Chris'],['Gewonnen','Lumen Commerce','18.500 €','Onboarding','Delivery']];const pill=(x,c)=>`<span class="pill ${c}">${x}</span>`,panel=(t,b)=>`<article class="card"><div class="panelhead"><h3>${t}</h3></div>${b}</article>`,metric=(l,v,d)=>`<article class="card metric"><span>${l}</span><strong>${v}</strong><small>${d}</small></article>`,intro=()=>`<div class="intro"><span>${desc[active]}</span><small>Stand: 10. Juli 2026</small></div>`;function save(){localStorage.setItem('firmen-os.tasks',JSON.stringify(tasks))}function cockpit(){let open=tasks.filter(t=>t.status!=='done').length,blocked=tasks.filter(t=>t.status==='blocked').length;return intro()+`<div class="hero"><article class="card focus"><div class="eyebrow">HEUTIGER FOKUS</div><h2>Foundation beweisen, bevor der Scope wächst.</h2><p>Firmen OS wird ein operatives Unternehmenssystem. Der nächste harte Gate ist echte Persistenz mit Organisationen, Rollen und RLS.</p><div class="actions"><button class="primary jump" data-jump="work">Arbeit öffnen</button><button class="secondary jump" data-jump="projects">Gates prüfen</button></div></article><article class="card"><div class="head"><div><div class="eyebrow">SYSTEM HEALTH</div><h3>8 / 9 Komponenten bereit</h3></div><span class="health">89%</span></div><div class="checks"><span>UI Foundation</span><span>Local State</span><span>Health Check</span><span class="warn">Datenbank offen</span></div></article></div><div class="metrics">${metric('Aktive Projekte','4','1 mit Risiko')}${metric('Offene Aufgaben',open,blocked+' blockiert')}${metric('Pipeline','22,7k €','gewichteter Wert')}${metric('Monatlicher Burn','1,9k €','Demo-Forecast')}</div><div class="grid2">${panel('Operative Prioritäten',tasks.slice(0,4).map(t=>`<div class="row">${pill(t.priority,t.priority)}<div><strong>${t.title}</strong><small>${t.project} · ${t.owner}</small></div>${pill(t.status,t.status)}</div>`).join(''))}${panel('Enterprise Gates','<div class="gate"><span class="ok">✓</span><div><strong>Produktgrenze definiert</strong><small>Foundation ist bewusst kein fertiges ERP.</small></div></div><div class="gate"><span class="ok">✓</span><div><strong>Build und Datenvertrag</strong><small>Tests, RLS-Modell und Audit-Konzept vorhanden.</small></div></div><div class="gate"><span>○</span><div><strong>Persistenz und Identität</strong><small>Eigenes Supabase-Projekt, Auth und Rollen.</small></div></div><div class="gate"><span>○</span><div><strong>Auditierbare Agenten</strong><small>Jobs, Freigaben, Logs und Kostenlimits.</small></div></div>')}</div>`}function company(){return intro()+`<div class="grid2">${panel('Mission','<article class="focus"><div class="eyebrow">UNTERNEHMENSZIEL</div><h2>Ein kleines Unternehmen so steuerbar machen wie ein gutes Engineering-System.</h2><p>Jede wichtige Arbeit besitzt Eigentümer, Zustand, Gate, Beweis und nächste Aktion.</p></article>')}${panel('Risiko-Register',[['high','Scope Drift','Neue Module vor Betriebsbeweis.'],['medium','Provider-Abhängigkeit','LLM-Ausfälle stoppen keine Kernprozesse.'],['medium','Datenqualität','Keine Automation auf ungeprüften Daten.'],['open','Komplexität','Progressive Offenlegung statt Dashboard-Lärm.']].map(r=>`<div class="row">${pill(r[0],r[0])}<div><strong>${r[1]}</strong><small>${r[2]}</small></div></div>`).join(''))}</div>`}function projectPage(){return intro()+panel('Projektportfolio',`<div class="projectgrid">${projects.map(p=>`<div class="project"><div class="head">${pill(p[3],p[3])}<small class="muted">${p[2]}%</small></div><h3>${p[0]}</h3><p>${p[1]}</p><div class="progress"><b style="width:${p[2]}%"></b></div><footer><b>${p[2]}%</b><span>Nächster Gate: ${p[4]}</span></footer></div>`).join('')}</div>`)}function work(){let list=tasks.filter(t=>(t.title+t.owner+t.project+t.status).toLowerCase().includes(q.toLowerCase()));return intro()+panel('Arbeitssteuerung',`<div class="tasktable"><div class="taskrow header"><span>Aufgabe</span><span>Projekt</span><span>Priorität</span><span>Status</span></div>${list.map(t=>`<div class="taskrow"><div><strong>${t.title}</strong><small>${t.owner} · ${t.due}</small></div><span>${t.project}</span>${pill(t.priority,t.priority)}<select data-id="${t.id}"><option value="open" ${t.status==='open'?'selected':''}>offen</option><option value="running" ${t.status==='running'?'selected':''}>läuft</option><option value="blocked" ${t.status==='blocked'?'selected':''}>blockiert</option><option value="done" ${t.status==='done'?'selected':''}>erledigt</option></select></div>`).join('')}</div>`)}function crm(){return intro()+panel('Opportunity Pipeline',`<div class="crm">${['Lead','Qualifiziert','Angebot','Gewonnen'].map(s=>`<div class="column"><h4>${s}</h4>${customers.filter(c=>c[0]===s).map(c=>`<div class="customer"><strong>${c[1]}</strong><b>${c[2]}</b><small>${c[3]}</small><em>${c[4]}</em></div>`).join('')}</div>`).join('')}</div>`)}function finance(){return intro()+`<div class="metrics">${metric('MRR','8.400 €','Demo-Daten')}${metric('Cash Runway','11 Monate','konservativ')}${metric('Forderungen','3.200 €','2 Rechnungen')}${metric('Tool-Kosten','186 €','monatlich')}</div><div class="grid2">${panel('Finanz-Gate','<p class="muted">Die Foundation zeigt Steuerungsdaten. Sie ersetzt keine Buchhaltung und keine Fantasie-Bilanz aus dem KI-Orakel.</p>')}${panel('Kostenkontrolle','<div class="gate"><span class="ok">✓</span><div><strong>KI-Budget unter Limit</strong><small>19 € im Demo-Monat</small></div></div><div class="gate"><span>○</span><div><strong>Zwei SaaS-Abos prüfen</strong><small>67 € ohne klaren Eigentümer</small></div></div>')}</div>`}function knowledge(){return intro()+`<div class="knowledgegrid">${[['Architektur','Systemgrenzen, Module und Datenflüsse.','12 Dokumente'],['Entscheidungen','Warum etwas gebaut oder verschoben wurde.','28 Einträge'],['Prozesse','Wiederholbare Abläufe mit Beweisen.','9 Prozesse'],['QA & Beweise','Builds, Tests, Screenshots und Logs.','17 Beweise'],['Sicherheit','Rollen, RLS, Secrets und Freigaben.','Gate offen'],['Lernpfad','Enterprise Engineering während des Baus.','6 Module']].map(k=>`<article class="card knowledge"><div class="eyebrow">▤</div><h3>${k[0]}</h3><p>${k[1]}</p><small>${k[2]}</small></article>`).join('')}</div>`}function agents(){return intro()+`<div class="grid2">${panel('Agenten-Laufzeit',[['ChatGPT Pilot','Planung, Review, Architektur','bereit','Freigabe'],['Codex Worker','Implementierung in Branches','bereit','Budget'],['Local Worker','Sichere Queue-Aufträge','offline','Lokal'],['Research Agent','Quellen und Marktprüfung','wartet','2 € Limit']].map(a=>`<div class="agent"><div class="avatar">✦</div><div><strong>${a[0]}</strong><small>${a[1]}</small></div><span class="good">${a[2]}</span><em>${a[3]}</em></div>`).join(''))}${panel('Nicht verhandelbare Regeln','<ol class="rules"><li>Kein Agent erhält freien Shell-Zugriff.</li><li>Jeder Job besitzt ID, Scope, Budget und Abbruchregel.</li><li>Schreibende Aktionen brauchen Beweis oder Freigabe.</li><li>Secrets stehen nie in Prompt, Log oder Repository.</li><li>Fehler werden sichtbar gestoppt.</li></ol>')}</div>`}const views={cockpit,company,projects:projectPage,work,crm,finance,knowledge,agents};function go(p){active=p;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.page===p));document.getElementById('side').classList.remove('show');render()}function render(){document.getElementById('title').textContent=labels[active];document.getElementById('path').textContent='Firmen OS / '+labels[active];document.getElementById('content').innerHTML=views[active]();document.querySelectorAll('.jump').forEach(b=>b.onclick=()=>go(b.dataset.jump));document.querySelectorAll('select[data-id]').forEach(s=>s.onchange=()=>{tasks=tasks.map(t=>t.id===s.dataset.id?{...t,status:s.value}:t);save();document.getElementById('notice').textContent='Aufgabe aktualisiert und lokal gespeichert.';render()})}document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));document.getElementById('mobile').onclick=()=>document.getElementById('side').classList.toggle('show');document.getElementById('search').oninput=e=>{q=e.target.value;active==='work'?render():go('work')};document.getElementById('add').onclick=()=>{tasks.unshift({id:String(Date.now()),title:'Neue operative Aufgabe prüfen',owner:'Chris',project:'Firmen OS',due:'Heute',priority:'medium',status:'open'});save();document.getElementById('notice').textContent='Neue Aufgabe angelegt.';go('work')};render();</script></body></html>
