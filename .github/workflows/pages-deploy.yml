name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe deployed Käufer demo and assets
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          root = os.environ['PAGE_URL'].rstrip('/')
          target = f"{root}/firmen-os-kaeufer-demo/"
          checks = {}

          def fetch(url: str, attempts: int, delay: int):
              last_error = 'unknown error'
              for attempt in range(1, attempts + 1):
                  try:
                      request = urllib.request.Request(url, headers={'User-Agent': 'firmen-os-pages-proof/1.0'})
                      with urllib.request.urlopen(request, timeout=30) as response:
                          body = response.read().decode('utf-8', errors='replace')
                          if response.status == 200:
                              return True, body, f'HTTP 200 on attempt {attempt}'
                          last_error = f'HTTP {response.status}'
                  except Exception as exc:
                      last_error = f'{type(exc).__name__}: {exc}'
                  if attempt < attempts:
                      time.sleep(delay)
              return False, '', last_error

          index_ok, index_body, index_detail = fetch(target, attempts=18, delay=10)
          checks['pages-index-http'] = {
              'ok': index_ok,
              'url': target,
              'detail': index_detail,
          }
          checks['pages-index-marker'] = {
              'ok': index_ok and 'UNAUTORISIERTER PROTOTYP' in index_body and 'Alle Geschäftsdaten sind synthetisch' in index_body,
              'url': target,
              'detail': 'required prototype and synthetic-data markers found' if index_ok and 'UNAUTORISIERTER PROTOTYP' in index_body and 'Alle Geschäftsdaten sind synthetisch' in index_body else 'required index markers missing',
          }

          assets = [
              ('pages-app-js', 'app.js', 'const workItems'),
              ('pages-truth-js', 'truth-audit.js', 'CONDITIONAL GO'),
              ('pages-manifest', 'manifest.webmanifest', '"display": "standalone"'),
              ('pages-service-worker', 'sw.js', 'firmen-os-kaeufer-demo'),
          ]
          for context, path, marker in assets:
              url = f'{target}{path}'
              ok, body, detail = fetch(url, attempts=6, delay=5)
              marker_ok = ok and marker in body
              checks[context] = {
                  'ok': marker_ok,
                  'url': url,
                  'detail': detail if not ok else (f'marker {marker!r} found' if marker_ok else f'marker {marker!r} missing'),
              }

          result = {'target': target, 'checks': checks}
          with open('/tmp/pages-proof.json', 'w', encoding='utf-8') as handle:
              json.dump(result, handle, ensure_ascii=False, indent=2)
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY

      - name: Publish granular Pages proof statuses
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          with open('/tmp/pages-proof.json', encoding='utf-8') as handle:
              result = json.load(handle)

          endpoint = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/statuses/{os.environ['GITHUB_SHA']}"
          for context, check in result['checks'].items():
              description = check['detail'][:140]
              payload = {
                  'state': 'success' if check['ok'] else 'failure',
                  'context': context,
                  'description': description,
                  'target_url': check['url'],
              }
              request = urllib.request.Request(
                  endpoint,
                  data=json.dumps(payload).encode('utf-8'),
                  headers={
                      'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
                  method='POST',
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  print(context, response.status)
          PY

      - name: Enforce all live proof checks
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open('/tmp/pages-proof.json', encoding='utf-8') as handle:
              result = json.load(handle)
          failed = [context for context, check in result['checks'].items() if not check['ok']]
          if failed:
              print('Failed live proof checks:', ', '.join(failed))
              sys.exit(1)
          print('All Pages live proof checks passed for', result['target'])
          PY
